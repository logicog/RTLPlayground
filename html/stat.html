<!DOCTYPE html>
<html>
  <head>
  <meta charset="utf-8">
  <script src="/main.js"></script>
  <link rel="stylesheet" href="style.css">
  <title>FreeSwitchOS 端口统计</title>
  <style>
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }
    .popup-content {
      background: #fff;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      height: 80%
    }
    .popup .popup-content {
       overflow-y: scroll;
    }
    </style>
  </head>
  <body>
    <nav id="sidebar"></nav>
    <div style="margin-left:16%;padding:1px 16px;height:1000px;">
    <div id="ports"></div>
    <div id="popup" class="popup">
        <div class="popup-content">
            <h2>端口详细统计</h2>
            <div id="popup_text"></div>
            <button id="closePopup" class="action">关闭</button>
        </div>
    </div>
    <h1>端口统计</h1>
    <table id="statstable">
      <tr> <th>端口</th> <th>名称</th> <th>链路</th> <th>TX 正常包</th> <th>TX 错误包</th> <th>RX 正常包</th> <th>RX 错误包</th> <th>全部计数器</th></tr>
      <script src="/stat.js"></script>
    </table>
    </div>
  </body>
  <script src="/navigation.js"></script>
</html>
