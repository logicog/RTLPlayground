<!DOCTYPE html>
<html>
  <head>
  <meta charset="utf-8">
  <script src="/main.js"></script>
  <link rel="stylesheet" href="style.css">
  <title>端口镜像配置</title>
  </head>
  <body>
    <nav id="sidebar"></nav>
    <div style="margin-left:16%;padding:1px 16px;height:1000px;">
    <div id="ports"></div>
    <h1>端口镜像配置</h1>
    <label class="tswitch">已启用: <input id="me" type="checkbox"></label><br/>
    <label for="mp">镜像目标端口:</label> <input type="number" id="mp" name="mp" min="1" max="9"/>
    <h2>被镜像端口 (TX)</h2>
    <div id="mPortsTX"></div>
    <br />
    <h2>被镜像端口 (RX)</h2>
    <div id="mPortsRX"></div>
    <br/> <input style="width:15%;" class="action" id="mirror_sub" onclick="mirrorSub();" type="button" value="更新/创建">
    <input style="width:15%;" class="action" id="mirror_del" onclick="mirrorDel();" type="button" value="禁用镜像">
    <script src="/mirror.js"></script>
    <script src="/mirror_sub.js"></script>
    </div>
    <script src="/navigation.js"></script>
  </body>
</html>
