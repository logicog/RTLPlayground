<!DOCTYPE html>
<html>
  <head>
  <meta charset="utf-8">
  <script src="/main.js"></script>
  <link rel="stylesheet" href="style.css">
  <title>FreeSwitchOS VLAN 配置</title>
  </head>
  <body>
    <nav id="sidebar"></nav>
    <div style="margin-left:16%;padding:1px 16px;height:1000px;">
    <div id="ports"></div>
    <h1>VLAN 配置</h1>
    <form id="vform" action="/vlan.html">
      <div>
        <label for="vlanSelect">选择 VLAN:</label>
        <select id="vlanSelect" style="margin: 0 0 0 8px">
          <option value="" disabled selected>— 选择 VLAN —</option>
        </select>
      </div>
      <br/>
      <div>
        <label for="vid">VLAN ID:</label>
        <input type="number" min="1" max="4094" id="vid" name="vid">
        <button type="button" style="margin: 0 0 0 24px" onclick="fetchVLAN();">获取配置</button>
      </div>
      <br/><br/>
      <label for="vname">VLAN 名称:</label>
      <input type="text" id="vname" name="vname"><br><br>
      <br/>
      <h2>Tagged 成员端口</h2>
      <div id="tPorts"><button type="button" style="transform: translateY(-100%);margin: 0 50px 0 0" onclick="utClicked(true);">全选</button></div>
      <h2>Untagged 成员端口</h2>
      <div id="uPorts"><button type="button" style="transform: translateY(-100%); margin: 0 50px 0 0" onclick="utClicked(false);">全选</button> </div>
      <h2>作为入站流量的默认 VLAN (PVID)</h2>
      <div id="pPorts"><button type="button" style="transform: translateY(-100%); margin: 0 50px 0 0" onclick="pvClicked(true);">全选</button> </div>
      <script src="/vlan.js"></script>
      <br/> <input style="width:40%;" class="action" id="vlan_sub" onclick="vlanSub();" type="button" value="更新/创建">
      <script src="/vlan_sub.js"></script>
    </form>
    <h2>已配置 VLAN</h2>
    <table id="vlanTable" style="width:90%">
      <thead>
        <tr>
          <th>VLAN</th>
          <th>名称</th>
          <th>成员端口</th>
          <th>Tagged 端口</th>
          <th>Untagged 端口</th>
          <th>PVID 端口</th>
          <th>删除</th>
        </tr>
      </thead>
      <tbody id="vlanTableBody">
      </tbody>
    </table>
    </div>
    <script src="/navigation.js"></script>
  </body>
</html>
